ram:
  versions:
    - EU
    - NA
    - JP
  address:
    EU: 0x2000000
    NA: 0x2000000
    JP: 0x2000000
  length:
    EU: 0x400000
    NA: 0x400000
    JP: 0x400000
  description: |-
    Main memory.
    Data in this file aren't located in the ROM itself, and are instead constructs loaded at runtime.
    
    More specifically, this file is a dumping ground for addresses that are useful to know about, but don't fall in the address ranges of any of the other files. Dynamically loaded constructs that do fall within the address range of a relevant binary should be listed in the corresponding YAML file of that binary, since it still has direct utility when reverse-engineering that particular binary.
    TODO: ensure the length is actually correct.
  functions: []
  data:
    - name: MISSION_QUEST_DATA_PTR
      address:
        NA: 0x20AF348
    - name: MEGASTRUCT_PTR_RAM
      address:
        NA: 0x20AF358
      description: Pointer to the megastruct that lives in ram. There is another in arm9.
    - name: RANGER_NET_MISSION_COMPLETION_BITS
      address:
        NA: 0x20AF598
      description: "Ported from Nep's notes. Seems to be consistent with what it claims to be though. Type currently unknown"
    - name: MISSION_QUEST_DATA
      address:
        NA: 0x20B2638
      length:
        NA: 0x5C
      description: "Likely a small portion of the save file, storing the current mission/quest and mission/quest progression."
    - name: RANGER_DATA
      address:
        NA: 0x20B26A0
      length:
        NA: 0x8B68
      description: "Likely a large portion of the save file, often called from memory from this particular offset. Likely larger in size than documented."
    - name: PARTY_POKEMON_TABLES
      address:
        NA: 0x20BAEA4
      length:
        NA: 0x2D0
      description: "A table of pokemon_data structs for all pokemon currently caught by the player. Includes land pokemon, sea pokemon, and a third unknown roster. Note: only slots 0-7 of each subtable are remembered in the save file!"
    - name: FOLLOWING_NPC_TABLE
      address:
        NA: 0x20BB174
      length:
        NA: 0x70
      description: A table of following_npc structs for up to 2 NPCs following the player around.
    - name: ARENA_GRAPHIC_ID
      address:
        NA: 0x20BB240
      description: Seems to be responsible for determining the background for battles and the release menu. Might be worth making an enum.
    - name: SETTINGS_AND_VARIABLES
      address:
        NA: 0x210C0B0
      length:
        NA: 0xFC
      description: "Seems to be a table of loose script variables for the main plot (Event), Settings (But there are only two settings???), and Quests (The Vientown signpost quest uses it, for unknown purposes)."
    - name: LCRNG_STATE
      address:
        NA: 0x210CEC8
      length:
        NA: 0xC
      description: "Tracks the current LCRNG state, add, and mult. Observed Mult: 0x5D588B65, Observed Add: 0x269EC3."
    - name: SYSCALL_PAGE_PTRS
      address:
        NA: 0x210CED8
      length:
        NA: 0x100
      description: "A table of pointers to pages of Syscall functions. Many pages seem to be unused, or are not currently written to ram."
